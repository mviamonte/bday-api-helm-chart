name: CI Python & Helm Validation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # Python lint job
  python-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configuring Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flake and black
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: checking format with black
        run: black --check .

      - name: Static verification with Flake8
        run: |
          # Build will stop if it founds errors or variable unused
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # Helm lint
  helm-validation:
    needs: python-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Install helm Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'
      - name: Lint Charts
        run:
          helm lint ./charts/hello-api
          helm lint ./charts/postgres-db