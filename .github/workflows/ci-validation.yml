name: CI Python & Helm Validation

on:
  pull_request:
    branches: [ master ]
  
  workflow_dispatch:

jobs:
  # Python lint job
  python-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configuring Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flake and black
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: checking format with black
        run: black .

      - name: Static verification with Flake8
        run: |
          # Build will stop if it founds errors or variable unused
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Audit Dependencies (SCA)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Security Scan (Bandit)
        run: |
          pip install bandit
          bandit -r . -ll # -ll severity high or mid

  # Helm lint
  helm-validation:
    needs: python-validation
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Installing helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      - name: API Lint
        run:
          helm lint ./charts/hello-api
      - name: Database lint
        run:
          helm lint ./charts/postgres-db
      
      - name: Scan Helm Charts (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: charts/
          framework: helm
          quiet: true 
      